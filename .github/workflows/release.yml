name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build and publish, for example v0.1.1. Defaults to the selected ref.'
        required: false
        type: string

permissions:
  contents: read

env:
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: code-search-linux-amd64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: code-search-darwin-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: code-search-darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: code-search-windows-amd64.exe

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust toolchain
        run: |
          rustup toolchain install 1.95.0 --profile minimal
          rustup default 1.95.0
          rustup target add ${{ matrix.target }}

      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        run: choco install protoc -y

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ${{ matrix.artifact }}.tar.gz code-search
          mv ${{ matrix.artifact }}.tar.gz ${{ github.workspace }}/

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ${{ matrix.artifact }}.zip code-search.exe
          mv ${{ matrix.artifact }}.zip ${{ github.workspace }}/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip

  publish:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.event.inputs.tag || github.ref_name, 'v')
    permissions:
      contents: write
    env:
      GITEA_REPOSITORY: ${{ vars.GITEA_REPOSITORY }}
      GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
      GITEA_URL: ${{ vars.GITEA_URL }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve release target
        id: release-target
        shell: bash
        run: |
          set -euo pipefail
          echo "tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          assets=(
            code-search-darwin-amd64.tar.gz
            code-search-darwin-arm64.tar.gz
            code-search-linux-amd64.tar.gz
            code-search-windows-amd64.exe.zip
          )
          for asset in "${assets[@]}"; do
            test -f "$asset"
          done
          sha256sum "${assets[@]}" > SHA256SUMS
          ls -lh

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ steps.release-target.outputs.sha }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber
          else
            gh release create "$RELEASE_TAG" dist/* \
              --title "$RELEASE_TAG" \
              --target "$TARGET_SHA" \
              --notes "Automated release for ${RELEASE_TAG}."
          fi

      - name: Publish Gitea release assets
        if: env.GITEA_TOKEN != ''
        env:
          TARGET_SHA: ${{ steps.release-target.outputs.sha }}
        shell: bash
        run: scripts/upload-gitea-release-assets.sh dist
