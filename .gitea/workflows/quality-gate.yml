name: Quality Gate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_bench:
        description: Run benchmark regression gate
        required: false
        default: "false"

jobs:
  quick:
    name: Quick Gate
    runs-on: ubuntu-latest
    container:
      image: rust:1.95-bookworm
    steps:
      - name: Install runner tools
        run: |
          apt-get update
          apt-get install -y --no-install-recommends git ca-certificates nodejs protobuf-compiler cmake libprotobuf-dev pkg-config libssl-dev clang sccache
          rustup component add rustfmt
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run quick quality gate
        run: scripts/quality-gate.sh quick
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_DIR: /workspace/.sccache
          SCCACHE_CACHE_SIZE: 2G

  cli:
    name: CLI Gate
    runs-on: ubuntu-latest
    needs: quick
    container:
      image: rust:1.95-bookworm
    steps:
      - name: Install runner tools
        run: |
          apt-get update
          apt-get install -y --no-install-recommends git ca-certificates jq nodejs protobuf-compiler cmake libprotobuf-dev pkg-config libssl-dev clang sccache
          rustup component add rustfmt
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run CLI quality gate
        run: scripts/quality-gate.sh cli
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_DIR: /workspace/.sccache
          SCCACHE_CACHE_SIZE: 2G

  bench:
    name: Benchmark Gate
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_bench == 'true' }}
    container:
      image: rust:1.95-bookworm
    steps:
      - name: Install runner tools
        run: |
          apt-get update
          apt-get install -y --no-install-recommends git ca-certificates jq bc hyperfine nodejs protobuf-compiler cmake libprotobuf-dev pkg-config libssl-dev clang sccache
          rustup component add rustfmt
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run benchmark quality gate
        run: scripts/quality-gate.sh bench
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_DIR: /workspace/.sccache
          SCCACHE_CACHE_SIZE: 2G

  cross-check:
    name: Cross-Platform Check
    runs-on: ubuntu-latest
    needs: quick
    container:
      image: rust:1.95-bookworm
    steps:
      - name: Install cross-compile toolchains
        run: |
          apt-get update
          apt-get install -y --no-install-recommends git ca-certificates nodejs protobuf-compiler cmake libprotobuf-dev pkg-config libssl-dev clang sccache mingw-w64
          rustup target add x86_64-pc-windows-gnu
          rustup target add x86_64-apple-darwin
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cross-compile check (Windows)
        run: cargo check --target x86_64-pc-windows-gnu
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_DIR: /workspace/.sccache
      - name: Cross-compile check (macOS)
        run: cargo check --target x86_64-apple-darwin
        continue-on-error: true
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_DIR: /workspace/.sccache
          SCCACHE_CACHE_SIZE: 2G
